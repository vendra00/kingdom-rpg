services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kingdomrpg
      POSTGRES_USER: kingdom
      POSTGRES_PASSWORD: kingdom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kingdom -d kingdomrpg"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
