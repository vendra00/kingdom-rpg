spring.application.name=kingdom-rpg

spring.datasource.url=jdbc:h2:mem:kingdomrpg
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Static resources (disable browser caching in dev) ────
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# ── Actuator ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
info.app.name=Kingdom RPG
info.app.version=@project.version@

# ── Logging (MDC: player, session) ────────────────────────
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%-15X{player:-system}] [%X{session:--}] %-36logger{36} %msg%n

# ── AI (NPC dialogue) ─────────────────────────────────────
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-haiku-4-5-20251001
anthropic.max-tokens=200

# ── Game balance ───────────────────────────────────────────
game.npc.conversation-history-limit=20
game.npc.trust-delta-min=-15
game.npc.trust-delta-max=8
game.ability-check.trust-crit-success=6
game.ability-check.trust-success=3
game.ability-check.trust-failure=-2
game.ability-check.trust-fumble=-6
