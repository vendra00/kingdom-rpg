spring.application.name=kingdom-rpg

spring.datasource.url=jdbc:h2:mem:kingdomrpg
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Actuator ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
info.app.name=Kingdom RPG
info.app.version=@project.version@

# ── Logging (MDC: player, session) ────────────────────────
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%-15X{player:-system}] [%X{session:--}] %-36logger{36} %msg%n
