<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom RPG</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app">

    <header id="header">
        <span id="title">&#9876; KINGDOM RPG</span>
        <div id="header-right">
            <button id="narrator-btn" class="hidden" title="Toggle narrator">&#128266; Narrator</button>
            <span id="player-info"></span>
        </div>
    </header>

    <div id="login-screen">
        <div id="login-box">
            <p class="login-title">Enter your name, traveller</p>
            <input type="text" id="player-name" placeholder="Your name..." maxlength="20" autocomplete="off">
            <button id="start-btn">Begin Adventure</button>
            <p class="login-hint">Press Enter or click the button</p>
        </div>
    </div>

    <div id="char-screen" class="hidden">
        <div id="char-wizard">
            <div id="wizard-header">
                <p id="wizard-player-name"></p>
                <div id="step-indicator"></div>
            </div>
            <div id="step-content"></div>
            <div id="wizard-nav">
                <button id="btn-back">← Back</button>
                <button id="btn-next">Next →</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="output"></div>
        <div id="input-row">
            <span id="prompt">&gt;</span>
            <input type="text" id="command-input" placeholder="Type a command..." autocomplete="off" spellcheck="false">
        </div>
    </div>

</div>
<script src="/js/game.js"></script>
</body>
</html>
